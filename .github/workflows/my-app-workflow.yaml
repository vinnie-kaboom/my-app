name: my-app - build, push, and dispatch

# About repository_dispatch and my-app-image-published:
# - After building and pushing a new Docker image, this workflow sends a repository_dispatch event to the GitOps repo (argo_cd_demo).
# - The event type is my-app-image-published.
# - The event payload includes the new image tag and the target environment (dev, staging, or prod).
# - This event tells the GitOps repo to update its image tag and trigger deployment via Argo CD.


on:
  push:
    branches: [main]
    paths:
      - src/**
      - helm/**
      - Dockerfile
      - .github/workflows/**
  workflow_dispatch:
      # Purpose:
      # - Build the my-app Docker image from source.
      # - Push the image to DockerHub.
      # - Notify the GitOps repo (argo_cd_demo) with the new image tag and environment so it can update and trigger deployment via Argo CD.

      # How it works:
      # - Runs on every push to main (if app code, helm, or Dockerfile changes), or can be run manually.
      # - Builds and pushes the image to DockerHub.
      # - Sends a repository_dispatch event to the GitOps repo with the new tag and environment.
    inputs:
      target_env:
        description: "Environment to update in GitOps repo"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  build-push-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: vincentzamora123/my-app
      DISPATCH_REPO: vinnie-kaboom/argo_cd_demo

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          [[ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]] || { echo "Missing DOCKERHUB_TOKEN"; exit 1; }
          [[ -n "${{ secrets.GH_DISPATCH_TOKEN }}" ]] || { echo "Missing GH_DISPATCH_TOKEN"; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker/Network diagnostics
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          docker version
          docker info
          echo "username=${DOCKERHUB_USERNAME}"
          echo "token_length=${#DOCKERHUB_TOKEN}"
          # Docker Hub should return 401 + WWW-Authenticate when reachable.
          curl -sSI https://registry-1.docker.io/v2/ | sed -n '1,20p'

      - name: Raw docker login test (bypass action)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: false

      - name: Preflight DockerHub push permissions
        run: |
          set -euo pipefail
          CHECK_TAG="push-check-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "Checking push permissions for ${IMAGE_NAME}:${CHECK_TAG}"
          if ! printf 'FROM scratch\nLABEL purpose="push-permission-check"\n' | docker buildx build --platform linux/amd64 --push -t "${IMAGE_NAME}:${CHECK_TAG}" -; then
            echo "Docker Hub push preflight failed."
            echo "Verify DOCKERHUB_TOKEN is a PAT from vincentzamora123 with Read & Write permissions and can push to ${IMAGE_NAME}."
            exit 1
          fi

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Show tags to be pushed
        run: |
          echo "Image: $IMAGE_NAME"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Version: ${{ steps.meta.outputs.version }}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}

      - name: Verify pushed image exists
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.meta.outputs.version }}"

      - name: Resolve dispatch target environment
        id: dispatch_vars
        env:
          INPUT_TARGET_ENV: ${{ inputs.target_env }}
        run: |
          TARGET_ENV="${INPUT_TARGET_ENV:-dev}"
          case "$TARGET_ENV" in
            dev|staging|prod) ;;
            *)
              echo "target_env must be one of: dev, staging, prod"
              exit 1
              ;;
          esac
          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Preflight GitHub dispatch token access
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/${DISPATCH_REPO}"
          STATUS=$(curl -sS -o /tmp/gh_repo_check.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API_URL")

          if [[ "$STATUS" == "200" ]]; then
            echo "GitHub token can access ${DISPATCH_REPO}."
            exit 0
          fi

          echo "GitHub token preflight failed with HTTP ${STATUS}."
          if [[ "$STATUS" == "401" ]]; then
            echo "GH_DISPATCH_TOKEN is invalid or expired."
          elif [[ "$STATUS" == "403" ]]; then
            echo "GH_DISPATCH_TOKEN lacks required repository permissions."
            echo "Use a PAT with repo/public_repo (classic) or Contents: Read & Write (fine-grained) on ${DISPATCH_REPO}."
          elif [[ "$STATUS" == "404" ]]; then
            echo "Repository ${DISPATCH_REPO} is not visible to this token (or does not exist)."
          fi
          cat /tmp/gh_repo_check.json
          exit 1

      - name: Dispatch image tag to GitOps repo
        env:
          TARGET_ENV: ${{ steps.dispatch_vars.outputs.target_env }}
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/${DISPATCH_REPO}/dispatches"
          PAYLOAD=$(cat <<JSON
          {"event_type":"my-app-image-published","client_payload":{"image_tag":"${{ steps.meta.outputs.version }}","target_env":"${TARGET_ENV}"}}
          JSON
          )

          STATUS=$(curl -sS -o /tmp/gh_dispatch.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API_URL" \
            -d "$PAYLOAD")

          if [[ "$STATUS" == "204" ]]; then
            echo "Repository dispatch sent successfully for image tag ${{ steps.meta.outputs.version }} (env=${TARGET_ENV})."
            exit 0
          fi

          echo "Repository dispatch failed with HTTP ${STATUS}."
          if [[ "$STATUS" == "401" ]]; then
            echo "GH_DISPATCH_TOKEN is invalid or expired."
          elif [[ "$STATUS" == "403" ]]; then
            echo "GH_DISPATCH_TOKEN cannot create repository dispatch events for ${DISPATCH_REPO}."
          elif [[ "$STATUS" == "404" ]]; then
            echo "Repository ${DISPATCH_REPO} is not visible to this token (or does not exist)."
          fi
          cat /tmp/gh_dispatch.json
          exit 1
