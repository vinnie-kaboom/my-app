name: my-app - build, push, and dispatch

on:
  push:
    branches: [main]
    paths:
      - src/**
      - Dockerfile
      - .github/workflows/**
  workflow_dispatch:

jobs:
  build-push-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/my-app
      DISPATCH_REPO: vinnie-kaboom/argo_cd_demo

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          [[ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]] || { echo "Missing DOCKERHUB_USERNAME"; exit 1; }
          [[ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]] || { echo "Missing DOCKERHUB_TOKEN"; exit 1; }
          [[ -n "${{ secrets.GH_DISPATCH_TOKEN }}" ]] || { echo "Missing GH_DISPATCH_TOKEN"; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Show tags to be pushed
        run: |
          echo "Image: $IMAGE_NAME"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Version: ${{ steps.meta.outputs.version }}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}

      - name: Verify pushed image exists
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.meta.outputs.version }}"

      - name: Dispatch image tag to GitOps repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_DISPATCH_TOKEN }}
          repository: ${{ env.DISPATCH_REPO }}
          event-type: my-app-image-published
          client-payload: |
            {"image_tag":"${{ steps.meta.outputs.version }}"}
